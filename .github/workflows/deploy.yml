name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  test:
    name: Run Tests (gate before deploy)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short
        env:
          OPENROUTER_API_KEY: test-ci-key
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-ci-service-key
          NYLAS_API_KEY: test-ci-nylas-key
          ERROR_WEBHOOK_URL: https://n8n.test/webhook/error

  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest
    needs: test        # ← solo despliega si los tests pasaron

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aguapp
            bash scripts/deploy.sh main

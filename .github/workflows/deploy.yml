name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -euo pipefail

            echo "==> Locating aguapp project directory..."
            REPO_DIR=$(docker inspect aguapp --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}')

            if [ -z "$REPO_DIR" ]; then
              echo "ERROR: Could not determine project directory from container labels"
              exit 1
            fi

            echo "==> Found project at: $REPO_DIR"
            cd "$REPO_DIR"

            echo "==> Pulling latest code..."
            git pull origin main

            echo "==> Building and restarting container..."
            docker compose up --build -d

            echo "==> Waiting for health check..."
            sleep 10
            docker compose ps

            echo "==> Deploy complete."
